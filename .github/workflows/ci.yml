name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_pro
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_pro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_pro?schema=public
      JWT_SECRET: ci-secret-change-me-32chars-minimum
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @nexus/domain build
      - run: pnpm --filter @nexus/shared build
      - run: pnpm --filter @nexus/config build
      - run: pnpm --filter @nexus/broker-adapters build
      - run: pnpm --filter @nexus/shared test
      - run: pnpm --filter @nexus/domain test
      - run: pnpm --filter @nexus/broker-adapters test
      - run: pnpm --filter @nexus/api prisma generate
      - run: pnpm --filter @nexus/api exec prisma migrate deploy
      - run: pnpm --filter @nexus/api exec tsc -p tsconfig.json --noEmit
      - run: pnpm --filter @nexus/web typecheck
